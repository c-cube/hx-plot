<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>htmx-plot demo</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="../dist/htmx-plot.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h2 { margin-top: 2rem; }
    .chart { border: 1px solid #ddd; display: inline-block; }
  </style>
</head>
<body>

<h1>htmx-plot demo</h1>

<!-- ── Case 1: inline JSON via hx-plot ───────────────────────────────────── -->
<h2>Inline JSON (<code>hx-plot</code>)</h2>
<p>JSON lives in a <code>&lt;script type="application/json"&gt;</code> element on the page.</p>

<script id="scatter-cfg" type="application/json">
{
  "marks": [
    { "type": "dot", "data": [
        {"x": 1, "y": 2}, {"x": 2, "y": 4}, {"x": 3, "y": 1},
        {"x": 4, "y": 5}, {"x": 5, "y": 3}, {"x": 6, "y": 7}
      ], "x": "x", "y": "y" }
  ]
}
</script>

<div hx-ext="plot" hx-plot="#scatter-cfg" hx-target="#scatter-out"></div>
<div id="scatter-out" class="chart"></div>

<!-- ── Case 2: fetch JSON via hx-get ─────────────────────────────────────── -->
<h2>URL fetch (<code>hx-get</code>)</h2>

<div hx-ext="plot" hx-get="plot-data.json" hx-trigger="load" hx-target="#fetch-out"></div>
<div id="fetch-out" class="chart"></div>

<!-- ── Case 3: polling ───────────────────────────────────────────────────── -->
<h2>Polling (<code>hx-trigger="every 3s"</code>)</h2>

<div hx-ext="plot" hx-get="plot-data.json" hx-trigger="every 3s" hx-target="#poll-out"></div>
<div id="poll-out" class="chart"></div>

</body>
</html>
