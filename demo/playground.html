<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hx-plot playground</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="../dist/hx-plot.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
    }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    select, button {
      padding: 0.35rem 0.7rem;
      font-size: 0.9rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    button.primary {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
      font-weight: 600;
    }
    button.primary:hover { background: #1d4ed8; }

    textarea {
      width: 100%;
      height: 220px;
      font-family: 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 0.82rem;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    textarea:focus { outline: 2px solid #2563eb; border-color: transparent; }

    .htmx-indicator { opacity: 0; transition: opacity 150ms; pointer-events: none; }
    .htmx-request .htmx-indicator,
    .htmx-indicator.htmx-request { opacity: 1; }

    #spinner {
      font-size: 0.82rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #spinner svg { animation: spin 0.8s linear infinite; }

    #chart-area {
      min-height: 60px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.5rem;
      margin-top: 0.5rem;
    }
    #chart-area:empty::before {
      content: 'Chart will appear here.';
      color: #aaa;
      font-size: 0.9rem;
    }

    #sw-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.1rem 0.5rem;
      border-radius: 99px;
      background: #fef9c3;
      color: #854d0e;
      border: 1px solid #fde68a;
    }
    #sw-badge.ready { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
  </style>
</head>
<body>

<h1>hx-plot playground</h1>
<p class="subtitle">
  Powered by a service worker — works offline after first load.
  <span id="sw-badge">⧗ registering…</span>
</p>

<div class="toolbar">
  <label for="examples" style="font-size:.9rem;font-weight:600">Examples:</label>
  <select id="examples">
    <option value="">-- pick one --</option>
    <option value="scatter">Scatter plot</option>
    <option value="bar">Bar chart</option>
    <option value="line">Line chart</option>
    <option value="area">Area chart</option>
    <option value="heatmap">Heatmap</option>
    <option value="histogram">Histogram</option>
  </select>
  <button class="primary"
          hx-post="/demo/api/plot"
          hx-include="#spec"
          hx-swap="none"
          hx-indicator="#spinner">Render ▶</button>
</div>

<textarea id="spec" name="spec" spellcheck="false"
          placeholder="Paste Vega-Lite JSON here…"
          hx-post="/demo/api/plot"
          hx-trigger="input changed delay:800ms"
          hx-swap="none"
          hx-indicator="#spinner"></textarea>

<div id="spinner" class="htmx-indicator" aria-live="polite">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <circle cx="7" cy="7" r="5.5" stroke="#d1d5db" stroke-width="2"/>
    <path d="M7 1.5a5.5 5.5 0 0 1 5.5 5.5" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  </svg>
  Rendering…
</div>

<!-- Fires the GET after SW signals plotReady via HX-Trigger response header -->
<div hx-ext="plot"
     hx-get="/demo/api/plot"
     hx-trigger="plotReady from:body"
     hx-target="#chart-area"
     hx-swap="innerHTML"
     hx-indicator="#spinner"></div>

<div id="chart-area"></div>

<script>
// ── example specs ─────────────────────────────────────────────
const EXAMPLES = {
  scatter: {
    mark: { type: 'point', tooltip: true },
    data: { values: Array.from({ length: 40 }, () => ({ x: Math.random() * 10, y: Math.random() * 10, c: ['A','B','C'][Math.floor(Math.random()*3)] })) },
    encoding: {
      x: { field: 'x', type: 'quantitative' },
      y: { field: 'y', type: 'quantitative' },
      color: { field: 'c', type: 'nominal' },
    },
  },
  bar: {
    mark: { type: 'bar', tooltip: true },
    data: { values: [
      { category: 'A', value: 28 }, { category: 'B', value: 55 },
      { category: 'C', value: 43 }, { category: 'D', value: 91 },
      { category: 'E', value: 67 }, { category: 'F', value: 38 },
    ]},
    encoding: {
      x: { field: 'category', type: 'nominal', axis: { labelAngle: 0 } },
      y: { field: 'value', type: 'quantitative' },
      color: { field: 'value', type: 'quantitative', scale: { scheme: 'blues' } },
    },
  },
  line: {
    mark: { type: 'line', point: true, tooltip: true },
    data: { values: Array.from({ length: 20 }, (_, i) => ({ t: i, v: Math.sin(i * 0.5) + Math.random() * 0.3 })) },
    encoding: {
      x: { field: 't', type: 'quantitative', title: 'time' },
      y: { field: 'v', type: 'quantitative', title: 'value' },
    },
  },
  area: {
    mark: { type: 'area', opacity: 0.7, tooltip: true },
    data: { values: Array.from({ length: 30 }, (_, i) => ({ t: i, v: Math.abs(Math.sin(i * 0.4) * (10 + i * 0.3)) })) },
    encoding: {
      x: { field: 't', type: 'quantitative', title: 'time' },
      y: { field: 'v', type: 'quantitative', title: 'value' },
      color: { value: '#6366f1' },
    },
  },
  heatmap: {
    mark: { type: 'rect', tooltip: true },
    data: { values: Array.from({ length: 49 }, (_, i) => ({ x: i % 7, y: Math.floor(i / 7), v: Math.random() })) },
    encoding: {
      x: { field: 'x', type: 'ordinal', title: 'col' },
      y: { field: 'y', type: 'ordinal', title: 'row' },
      color: { field: 'v', type: 'quantitative', scale: { scheme: 'viridis' } },
    },
  },
  histogram: {
    mark: { type: 'bar', tooltip: true },
    data: { values: Array.from({ length: 200 }, () => ({ v: (Math.random() + Math.random() + Math.random()) / 3 * 100 })) },
    encoding: {
      x: { field: 'v', type: 'quantitative', bin: { maxbins: 20 }, title: 'value' },
      y: { aggregate: 'count', type: 'quantitative' },
    },
  },
};

// ── service worker ──────────────────────────────────────────────
const badge = document.getElementById('sw-badge');
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    // Wait until the SW is actually controlling the page.
    const ready = () => { badge.textContent = '\u2713 service worker active'; badge.className = 'ready'; };
    if (navigator.serviceWorker.controller) { ready(); }
    else { navigator.serviceWorker.addEventListener('controllerchange', ready, { once: true }); }
  }).catch(err => {
    badge.textContent = '\u2717 SW failed: ' + err.message;
  });
} else {
  badge.textContent = '\u2717 service workers not supported';
}

// ── UI ───────────────────────────────────────────────────────────────
const textarea = document.getElementById('spec');

document.getElementById('examples').addEventListener('change', e => {
  const spec = EXAMPLES[e.target.value];
  if (!spec) return;
  textarea.value = JSON.stringify(spec, null, 2);
  textarea.dispatchEvent(new Event('input')); // let htmx pick it up
});

// ── pre-load scatter on first visit ─────────────────────────────────────────
window.addEventListener('load', () => {
  const sel = document.getElementById('examples');
  sel.value = 'scatter';
  sel.dispatchEvent(new Event('change'));
});
</script>

</body>
</html>
